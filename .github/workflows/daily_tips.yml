name: Daily Betting Tips

on:
  schedule:
    # Τρέχει κάθε μέρα στις 08:00 το πρωί
    - cron: '0 8 * * *'
  workflow_dispatch: # Σου επιτρέπει να το τρέχεις χειροκίνητα

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Prediction Script
        run: |
          python main.py
        # Εδώ αφαιρέσαμε το "> daily_predictions.txt" γιατί η Python το φτιάχνει μόνη της σωστά.

      - name: Commit and Push results
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add daily_predictions.txt
          git commit -m "Update daily predictions" || exit 0
          git push
