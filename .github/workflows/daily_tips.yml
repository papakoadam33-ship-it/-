name: Daily Betting Tips

on:
  schedule:
    # 06:00 (Πρωί - για τα πρώτα νέα)
    # 13:00 (Μεσημέρι - πριν τους αγώνες)
    # 21:00 (Βράδυ - για τα νυχτερινά και το Copa Libertadores)
    # Σημείωση: Οι ώρες είναι σε UTC (2-3 ώρες πίσω από Ελλάδα)
    - cron: '0 4,11,19 * * *'
  workflow_dispatch: # Σου επιτρέπει να το τρέχεις και χειροκίνητα

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run prediction script
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_predictions.txt
          git commit -m "Auto-update predictions" || exit 0
          git push
