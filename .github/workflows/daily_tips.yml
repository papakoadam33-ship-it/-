name: Daily Betting Tips

on:
  schedule:
    - cron: '0 8 * * *' # Τρέχει αυτόματα κάθε πρωί στις 11:00 Ελλάδος
  workflow_dispatch: # Σου επιτρέπει να το τρέχεις χειροκίνητα

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ΑΠΑΡΑΙΤΗΤΟ: Δίνει άδεια εγγραφής στο αρχείο
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run prediction script
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily_predictions.txt
          git commit -m "Update predictions $(date)" || exit 0
          git push
