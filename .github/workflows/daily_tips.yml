name: Daily Betting Tips

on:
  schedule:
    # Τρέχει κάθε μέρα στις 08:00 το πρωί (ώρα UTC)
    - cron: '0 8 * * *'
  workflow_dispatch: # Σου επιτρέπει να το τρέχεις και χειροκίνητα όποτε θες

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Prediction Script
        run: python main.py > daily_predictions.txt

      - name: Commit and Push results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add daily_predictions.txt
          git commit -m "Update daily predictions" || exit 0
          git push
